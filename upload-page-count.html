<!DOCTYPE html>
<html lang="en">
<head>

  <title>Upload PDF - Count Pages</title>

      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }
    .upload-area {
      border: 2px dashed #333;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .upload-area:hover {
      background: #f5f5f5;
    }
    #fileInput {
      display: none;
    }
    .file-info {
      background: #e8f5e9;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      display: none;
    }
    .file-info.show {
      display: block;
    }
    .file-name {
      font-weight: bold;
      margin-bottom: 5px;

    }
    .total-pages {
      background: #1976d2;
      color: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 8px;
      display: none;
      text-align: center;
      font-size: 20px;
    }
    .total-pages.show {
      display: block;
    }
    .loading {
      color: #666;
    }
  </style>
</head>

  <h1>📄 Upload PDF - Count Pages</h1>
  
  <div class="upload-area" onclick="document.getElementById('fileInput').click()">

  </div>
